# /etc/zabbix/zabbix_agent2.d/proxmox-raid-smart.conf
# Proxmox RAID SMART + RAID state monitoring via one unified script.
# Base device is /dev/sda because that is the OS-visible VD on this host.

############ PHYSICAL DISK DISCOVERY ############
UserParameter=proxmox.raid.pd.discovery,sudo /usr/local/bin/proxmox_raid_pd_attr.sh discover /dev/sda

############ PHYSICAL DISK SMART / SSD ITEMS ############
UserParameter=proxmox.raid.pd.dynamic.status[*],sudo /usr/local/bin/proxmox_raid_pd_attr.sh dynamic /dev/sda "$1"
UserParameter=proxmox.raid.pd.health.raw[*],sudo /usr/local/bin/proxmox_raid_pd_attr.sh health /dev/sda "$1"
UserParameter=proxmox.raid.pd.health[*],sudo /usr/local/bin/proxmox_raid_pd_attr.sh health /dev/sda "$1"
UserParameter=proxmox.raid.pd.type[*],sudo /usr/local/bin/proxmox_raid_pd_attr.sh type /dev/sda "$1"
UserParameter=proxmox.raid.pd.wear.pct[*],sudo /usr/local/bin/proxmox_raid_pd_attr.sh wearpct /dev/sda "$1"
UserParameter=proxmox.raid.pd.wear[*],sudo /usr/local/bin/proxmox_raid_pd_attr.sh wear /dev/sda "$1"

############ PHYSICAL DISK RAID-CONTROLLER STATE ############
# Raw examples: Onln, Rbld, Offln, UGood
UserParameter=proxmox.raid.pd.state.raw[*],sudo /usr/local/bin/proxmox_raid_pd_attr.sh pdstate.raw /dev/sda "$1"
# Normalized examples: online, rebuilding, failed, good
UserParameter=proxmox.raid.pd.state[*],sudo /usr/local/bin/proxmox_raid_pd_attr.sh pdstate /dev/sda "$1"
# Numeric mapping: 0 unknown, 1 ok, 3 warning, 5 critical
UserParameter=proxmox.raid.pd.raid.dynamic.status[*],sudo /usr/local/bin/proxmox_raid_pd_attr.sh pddynamic /dev/sda "$1"

############ VIRTUAL DRIVE DISCOVERY / STATE ############
UserParameter=proxmox.raid.vd.discovery,sudo /usr/local/bin/proxmox_raid_pd_attr.sh vddiscover /dev/sda
UserParameter=proxmox.raid.vd.state.raw[*],sudo /usr/local/bin/proxmox_raid_pd_attr.sh vdstate.raw /dev/sda "$1"
UserParameter=proxmox.raid.vd.state[*],sudo /usr/local/bin/proxmox_raid_pd_attr.sh vdstate /dev/sda "$1"
UserParameter=proxmox.raid.vd.dynamic.status[*],sudo /usr/local/bin/proxmox_raid_pd_attr.sh vddynamic /dev/sda "$1"
