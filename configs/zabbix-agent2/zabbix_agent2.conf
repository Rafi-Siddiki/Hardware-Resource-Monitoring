# This is a configuration file for Zabbix agent 2 (Unix)
# Updated for Proxmox RAID SMART + RAID controller state monitoring

############ GENERAL PARAMETERS #################

PidFile=/run/zabbix/zabbix_agent2.pid

LogFile=/var/log/zabbix/zabbix_agent2.log
LogFileSize=0

##### Passive checks related
Server= "Zabbix Server IP"

##### Active checks related
ServerActive="Zabbix Server IP"
Hostname="HOST Server Name"

############ ADVANCED PARAMETERS #################

Timeout=15

####### USER-DEFINED MONITORED PARAMETERS #######

ControlSocket=/run/zabbix/agent.sock

####### TLS-RELATED PARAMETERS #######
# Keep unencrypted for now unless you decide to enable PSK later.
# TLSConnect=unencrypted
# TLSAccept=unencrypted

####### ITEM KEY RESTRICTIONS #######
# Allow only the keys needed for this RAID/SMART setup.
# Remove AllowKey=system.run[*] unless you use it elsewhere.

AllowKey=proxmox.raid.pd.discovery
AllowKey=proxmox.raid.pd.dynamic.status[*]
AllowKey=proxmox.raid.pd.health.raw[*]
AllowKey=proxmox.raid.pd.health[*]
AllowKey=proxmox.raid.pd.type[*]
AllowKey=proxmox.raid.pd.wear.pct[*]
AllowKey=proxmox.raid.pd.wear[*]

AllowKey=proxmox.raid.pd.state.raw[*]
AllowKey=proxmox.raid.pd.state[*]
AllowKey=proxmox.raid.pd.raid.dynamic.status[*]

AllowKey=proxmox.raid.vd.discovery
AllowKey=proxmox.raid.vd.state.raw[*]
AllowKey=proxmox.raid.vd.state[*]
AllowKey=proxmox.raid.vd.dynamic.status[*]

DenyKey=*

### Includes
Include=./zabbix_agent2.d/plugins.d/*.conf
Include=/etc/zabbix/zabbix_agent2.d/*.conf
