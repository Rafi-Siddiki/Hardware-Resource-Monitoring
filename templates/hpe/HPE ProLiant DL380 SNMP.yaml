zabbix_export:
  version: '7.4'
  template_groups:
  - uuid: 0f609231b71d482688fa67d37d9b3328
    name: Templates/Servers Hardware
  templates:
  - uuid: 47a37e091c774cd3bfb5aa09ce7a813c
    template: HPE ProLiant DL380 SNMP Unified
    name: HPE ProLiant DL380 SNMP Unified
    description: |
      HPE ProLiant DL380 SNMP template rebuilt in the Lenovo unified style.
      Includes:
        - Normalized dashboard status items with constant indicator values across templates
        - Matched discovery item names for shared dashboard patterns
        - Overview + Discoveries dashboards similar to the Lenovo unified template
        - Original official items/triggers preserved for vendor-specific monitoring

      Unified numeric model used by dashboard items:
        0 = Unknown / not available
        1 = OK / online / normal
        2 = Spare / standby (unused where not applicable)
        3 = Warning / degraded
        4 = Rebuilding / in progress
        5 = Failed / critical / offline
    vendor:
      name: Custom
      version: 7.0-unified-1
    groups:
    - name: Templates/Servers Hardware
    items:
    - uuid: 8621fbfa38b243558368eeb53f8700de
      name: System contact details
      type: SNMP_AGENT
      snmp_oid: get[1.3.6.1.2.1.1.4.0]
      key: hp.server.contact[sysContact]
      delay: 1h
      value_type: CHAR
      description: |
        MIB: SNMPv2-MIB
        The textual identification of the contact person for this managed node, together with information on how to contact this person.  If no contact information is known, the value is the zero-length string.
      inventory_link: CONTACT
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: component
        value: system
    - uuid: 4f95a7aa111f40f4976e7560d8c5eac4
      name: System description
      type: SNMP_AGENT
      snmp_oid: get[1.3.6.1.2.1.1.1.0]
      key: hp.server.descr[sysDescr]
      delay: 1h
      value_type: CHAR
      description: |
        MIB: SNMPv2-MIB
        A textual description of the entity. This value should
        include the full name and version identification of the system's hardware type, software operating-system, and
        networking software.
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: component
        value: system
    - uuid: 854f55eef4714bba9eefaf0dd5728b8f
      name: Hardware model name
      type: SNMP_AGENT
      snmp_oid: get[1.3.6.1.4.1.232.2.2.4.2.0]
      key: hp.server.hw.model[cpqSiProductName]
      value_type: CHAR
      description: |
        MIB: CPQSINFO-MIB
        The machine product name. The name of the machine used in this system.
      inventory_link: MODEL
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 6h
      tags:
      - tag: component
        value: system
    - uuid: 130dd7c6018d484ebb6cd9e1d29790e6
      name: Hardware serial number
      type: SNMP_AGENT
      snmp_oid: get[1.3.6.1.4.1.232.2.2.2.1.0]
      key: hp.server.hw.serialnumber[cpqSiSysSerialNum]
      value_type: CHAR
      description: |
        MIB: CPQSINFO-MIB
        The serial number of the physical system unit. The string will be empty if the system does not report the serial number function.
      inventory_link: SERIALNO_A
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 6h
      tags:
      - tag: component
        value: system
      triggers:
      - uuid: d6f59a017e784a1fb70541c908c4400d
        expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.serialnumber[cpqSiSysSerialNum],#1)<>last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.serialnumber[cpqSiSysSerialNum],#2) and length(last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.serialnumber[cpqSiSysSerialNum]))>0
        name: 'HPE ProLiant DL380: Device has been replaced'
        event_name: 'HPE ProLiant DL380: Device has been replaced (new serial number received)'
        priority: INFO
        description: Device serial number has changed. Acknowledge to close the problem manually.
        manual_close: 'YES'
        tags:
        - tag: scope
          value: notice
    - uuid: 90fa264f68cd4f5bb13be6fdb8635d1c
      name: Uptime (hardware)
      type: SNMP_AGENT
      snmp_oid: get[1.3.6.1.2.1.25.1.1.0]
      key: hp.server.hw.uptime[hrSystemUptime]
      trends: '0'
      units: uptime
      description: |
        MIB: HOST-RESOURCES-MIB
        The amount of time since this host was last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB [RFC1907] because sysUpTime is the uptime of the network management portion of the system.
      preprocessing:
      - type: CHECK_NOT_SUPPORTED
        parameters:
        - '-1'
        error_handler: CUSTOM_VALUE
        error_handler_params: '0'
      - type: MULTIPLIER
        parameters:
        - '0.01'
      tags:
      - tag: component
        value: system
    - uuid: 369d512fd93f4b9aa71dd49b40595fef
      name: System location
      type: SNMP_AGENT
      snmp_oid: get[1.3.6.1.2.1.1.6.0]
      key: hp.server.location[sysLocation]
      delay: 15m
      value_type: CHAR
      description: |
        MIB: SNMPv2-MIB
        The physical location of this node (e.g., `telephone closet, 3rd floor').  If the location is unknown, the value is the zero-length string.
      inventory_link: LOCATION
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 6h
      tags:
      - tag: component
        value: system
    - uuid: 7f02c28538f34337a7ea96198bd01d4e
      name: System name
      type: SNMP_AGENT
      snmp_oid: get[1.3.6.1.2.1.1.5.0]
      key: hp.server.name[sysName]
      delay: 15m
      value_type: CHAR
      description: |
        MIB: SNMPv2-MIB
        An administratively-assigned name for this managed node.By convention, this is the node's fully-qualified domain name.  If the name is unknown, the value is the zero-length string.
      inventory_link: NAME
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 6h
      tags:
      - tag: component
        value: system
      triggers:
      - uuid: deed09042baa49f49c75bc2e0552d553
        expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.name[sysName],#1)<>last(/HPE ProLiant DL380 SNMP Unified/hp.server.name[sysName],#2) and length(last(/HPE ProLiant DL380 SNMP Unified/hp.server.name[sysName]))>0
        name: 'HPE ProLiant DL380: System name has changed'
        event_name: 'HPE ProLiant DL380: System name has changed (new name: {ITEM.VALUE})'
        priority: INFO
        description: The name of the system has changed. Acknowledge to close the problem manually.
        manual_close: 'YES'
        tags:
        - tag: scope
          value: notice
    - uuid: ae86655983bd42b4bd4dc343678fba7e
      name: Uptime (network)
      type: SNMP_AGENT
      snmp_oid: get[1.3.6.1.2.1.1.3.0]
      key: hp.server.net.uptime[sysUpTime]
      trends: '0'
      units: uptime
      description: |
        MIB: SNMPv2-MIB
        The time (in hundredths of a second) since the network management portion of the system was last re-initialized.
      preprocessing:
      - type: MULTIPLIER
        parameters:
        - '0.01'
      tags:
      - tag: component
        value: system
    - uuid: 1c699114362448f39694acaf2da9a825
      name: System object ID
      type: SNMP_AGENT
      snmp_oid: get[1.3.6.1.2.1.1.2.0]
      key: hp.server.objectid[sysObjectID]
      delay: 15m
      value_type: CHAR
      description: |
        MIB: SNMPv2-MIB
        The vendor's authoritative identification of the network management subsystem contained in the entity.  This value is allocated within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones, Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier 1.3.6.1.4.1.4242.1.1 to its `Fred Router'.
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 6h
      tags:
      - tag: component
        value: system
    - uuid: ac95f04feb46439086adec06563ad9c1
      name: System temperature status
      type: SNMP_AGENT
      snmp_oid: get[1.3.6.1.4.1.232.6.2.6.1.0]
      key: hp.server.sensor.temp.status[cpqHeThermalCondition]
      trends: '0'
      description: |
        MIB: CPQHLTH-MIB
        This value specifies the overall condition of the system's thermal environment.
        This value will be one of the following:
        other(1)  Temperature could not be determined.
        ok(2)  The temperature sensor is within normal operating range.
        degraded(3)  The temperature sensor is outside of normal operating range.
        failed(4)  The temperature sensor detects a condition that could  permanently damage the system.
      valuemap:
        name: CPQSINFO-MIB::status
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 6h
      tags:
      - tag: component
        value: temperature
    - uuid: 675154c84b83443a93649198415a6ee6
      name: Overall system health status
      type: SNMP_AGENT
      snmp_oid: get[1.3.6.1.4.1.232.6.1.3.0]
      key: hp.server.status[cpqHeMibCondition]
      trends: '0'
      description: |
        MIB: CPQHLTH-MIB
        The overall condition. This object represents the overall status of the server information represented by this MIB.
      valuemap:
        name: CPQSINFO-MIB::status
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 6h
      tags:
      - tag: component
        value: health
      - tag: component
        value: system
      triggers:
      - uuid: 79ccb13269774f2f8a4a3c786cfae156
        expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.status[cpqHeMibCondition])={$HEALTH.STATUS.CRIT}
        name: 'HPE ProLiant DL380: System status is in critical state'
        opdata: 'Current state: {ITEM.LASTVALUE1}'
        priority: HIGH
        description: Please check the device for errors.
        tags:
        - tag: scope
          value: available
      - uuid: c80b3bfd90f9465085c5c014e107e8be
        expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.status[cpqHeMibCondition])={$HEALTH.STATUS.WARN}
        name: 'HPE ProLiant DL380: System status is in warning state'
        opdata: 'Current state: {ITEM.LASTVALUE1}'
        priority: WARNING
        description: Please check the device for warnings.
        dependencies:
        - name: 'HPE ProLiant DL380: System status is in critical state'
          expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.status[cpqHeMibCondition])={$HEALTH.STATUS.CRIT}
        tags:
        - tag: scope
          value: available
    - uuid: 2b9b8d57a99040aab07f79d2f078a313
      name: SNMP traps (fallback)
      type: SNMP_TRAP
      key: snmptrap.fallback
      value_type: LOG
      description: The item is used to collect all SNMP traps unmatched by other snmptrap items.
      logtimefmt: hh:mm:sszyyyy/MM/dd
      tags:
      - tag: component
        value: network
    - uuid: d0e1349671c24371bb94fddd7257d8db
      name: Overall system health (normalized)
      type: DEPENDENT
      key: unified.system.health
      description: 'Unified dashboard status: 0=Unknown,1=OK,3=Warning,5=Critical.'
      valuemap:
        name: Unified component status
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - |
          var v = Number(value);
          if (isNaN(v)) return 0;
          if (v === 2) return 1;
          if (v === 3) return 3;
          if (v === 4) return 5;
          return 0;
      master_item:
        key: hp.server.status[cpqHeMibCondition]
      tags:
      - tag: component
        value: health
      - tag: component
        value: system
      - tag: style
        value: unified
    - uuid: 535c9fe567f042acb7a3cc603fc790d5
      name: Thermal status (normalized)
      type: DEPENDENT
      key: unified.system.thermal
      description: 'Unified dashboard status: 0=Unknown,1=OK,3=Warning,5=Critical.'
      valuemap:
        name: Unified component status
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - |
          var v = Number(value);
          if (isNaN(v)) return 0;
          if (v === 2) return 1;
          if (v === 3) return 3;
          if (v === 4) return 5;
          return 0;
      master_item:
        key: hp.server.sensor.temp.status[cpqHeThermalCondition]
      tags:
      - tag: component
        value: system
      - tag: component
        value: temperature
      - tag: style
        value: unified
    - uuid: 9e57519a9c6f4526978b355a5a517569
      name: SNMP agent availability
      type: INTERNAL
      key: zabbix[host,snmp,available]
      valuemap:
        name: zabbix.host.available
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 6h
      tags:
      - tag: component
        value: health
      - tag: component
        value: system
      triggers:
      - uuid: 6f2da04e414342478e94ba826f24464b
        expression: max(/HPE ProLiant DL380 SNMP Unified/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0
        name: 'HPE ProLiant DL380: No SNMP data collection'
        opdata: 'Current state: {ITEM.LASTVALUE1}'
        priority: WARNING
        description: SNMP is not available for polling. Please check device connectivity and SNMP settings.
        tags:
        - tag: scope
          value: available
    discovery_rules:
    - uuid: bb0ac61192a34f7ea7eb661bd7145e22
      name: Array controller cache discovery
      type: SNMP_AGENT
      snmp_oid: discovery[{#CACHE_STATUS},1.3.6.1.4.1.232.3.2.2.2.1.2,{#CACHE_CNTRL_INDEX},1.3.6.1.4.1.232.3.2.2.2.1.1]
      key: array.cache.discovery
      delay: 1h
      description: 'Scanning table of Array controllers: CPQIDA-MIB::cpqDaAccelTable'
      item_prototypes:
      - uuid: aa451b0eddef4ddcb294d577c027138c
        name: '#{#CACHE_CNTRL_INDEX}: Disk array cache controller battery status'
        type: SNMP_AGENT
        snmp_oid: get[1.3.6.1.4.1.232.3.2.2.2.1.6.{#SNMPINDEX}]
        key: hp.server.hw.diskarray.cache.battery.status[cpqDaAccelBattery.{#SNMPINDEX}]
        trends: '0'
        description: |
          MIB: CPQIDA-MIB
          Cache Module Board Backup Power Status. This monitors the status of each backup power source on the board.
          The backup power source can only recharge when the system has power applied. The type of backup power source used is indicated by cpqDaAccelBackupPowerSource.
          The following values are valid:
          Other (1)  Indicates that the instrument agent does not recognize  backup power status.  You may need to update your software.

          Ok (2)  The backup power source is fully charged.

          Recharging (3)  The array controller has one or more cache module backup power  sources that are recharging.
          Cache module operations such as Battery/Flash Backed Write Cache, Expansion, Extension and Migration are temporarily suspended until the backup power source is fully charged.
          Cache module operations will automatically resume  when charging is complete.

          Failed (4)  The battery pack is below the sufficient voltage level and  has not recharged in 36 hours.
          Your Cache Module board  needs to be serviced.

          Degraded (5)  The battery is still operating, however, one of the batteries  in the pack has failed to recharge properly.
          Your Cache  Module board should be serviced as soon as possible.

          NotPresent (6)  A backup power source is not present on the cache module board. Some controllers do not have backup power sources.

          Capacitor Failed (7)  The flash backed cache module capacitor is below the sufficient voltage level and has not recharged in 10 minutes.  Your Cache Module board needs to be serviced.
        valuemap:
          name: CPQIDA-MIB::cpqDaAccelBattery
        preprocessing:
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 6h
        tags:
        - tag: component
          value: diskarray
        - tag: component
          value: storage
        trigger_prototypes:
        - uuid: 84344362b21c4cd7a9e5da69cd1e3b01
          expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.battery.status[cpqDaAccelBattery.{#SNMPINDEX}])={$DISK.ARRAY.CACHE.BATTERY.STATUS.CRIT:"failed"} or last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.battery.status[cpqDaAccelBattery.{#SNMPINDEX}])={$DISK.ARRAY.CACHE.BATTERY.STATUS.CRIT:"capacitorFailed"}
          name: 'HPE ProLiant DL380: #{#CACHE_CNTRL_INDEX}: Disk array cache controller battery is in critical state'
          opdata: 'Current state: {ITEM.LASTVALUE1}'
          priority: AVERAGE
          description: Please check the device for faults.
          tags:
          - tag: scope
            value: available
        - uuid: fdf59302722f4e03b2d697a79b5568bb
          expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.battery.status[cpqDaAccelBattery.{#SNMPINDEX}])={$DISK.ARRAY.CACHE.BATTERY.STATUS.WARN:"degraded"}
          name: 'HPE ProLiant DL380: #{#CACHE_CNTRL_INDEX}: Disk array cache controller battery is in warning state'
          opdata: 'Current state: {ITEM.LASTVALUE1}'
          priority: WARNING
          description: Please check the device for faults.
          dependencies:
          - name: 'HPE ProLiant DL380: #{#CACHE_CNTRL_INDEX}: Disk array cache controller battery is in critical state'
            expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.battery.status[cpqDaAccelBattery.{#SNMPINDEX}])={$DISK.ARRAY.CACHE.BATTERY.STATUS.CRIT:"failed"} or last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.battery.status[cpqDaAccelBattery.{#SNMPINDEX}])={$DISK.ARRAY.CACHE.BATTERY.STATUS.CRIT:"capacitorFailed"}
          tags:
          - tag: scope
            value: available
      - uuid: 2d9c6a1040e8495da93ba8f2afb52181
        name: '#{#CACHE_CNTRL_INDEX}: Disk array cache controller status'
        type: SNMP_AGENT
        snmp_oid: get[1.3.6.1.4.1.232.3.2.2.2.1.2.{#SNMPINDEX}]
        key: hp.server.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}]
        trends: '0'
        description: |
          MIB: CPQIDA-MIB
          Cache Module/Operations Status. This describes the status of the cache module and/or cache operations.
          Note that for some controller models, a cache module board that physically attaches to the controller or chipset may not be an available option.

          The status can be:
          Other (1)
           Indicates that the instrument agent does not recognize the status of the cache module. You may need to upgrade the instrument agent.

          Invalid (2)
           Indicates that a cache module board has not been installed in this system or is present but not configured.

          Enabled (3)
           Indicates that cache operations are currently configured and enabled for at least one logical drive.

          Temporarily Disabled (4)
           Indicates that cache operations have been temporarily disabled. View the cache module board error code object to determine why the write cache operations have been temporarily disabled.

          Permanently Disabled (5)
           Indicates that cache operations have been permanently disabled.  View the cache module board error code object to determine why the write cache operations have been disabled.

          Cache Module Flash Memory Not Attached (6)
           Indicates that the flash memory component of the flash backed cache module is not attached. This status will be set when the flash memory is not attached and the Supercap is attached. This value is only used on flash backed cache modules that support removable flash memory.

          Cache Module Degraded Failsafe Speed (7)
           Indicates that the cache module board is currently degraded and operating at a failsafe speed. View variables cpqDaCacheMemoryDataWidth and cpqDaCacheMemoryTransferRate to obtain the cache module board`s current memory data width and memory transfer rate.

          Cache Module Critical Failure (8)
           Indicates that the cache module board has encountered a critical failure. The controller is currently operating in Zero Memory Raid mode.

          Read Cache Could Not Be Mapped (9)
           Indicates that the read cache memory in  a split cache configuration could not be mapped by the operating system and as a result is not available. This status may be caused by virtual space limitations in certain operating systems and is only applicable to B-Series controllers.
        valuemap:
          name: CPQIDA-MIB::cpqDaAccelStatus
        preprocessing:
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 6h
        tags:
        - tag: component
          value: diskarray
        - tag: component
          value: storage
        trigger_prototypes:
        - uuid: 58852cfb41c24f1c8831b484c3f123b2
          expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}])={$DISK.ARRAY.CACHE.STATUS.CRIT:"cacheModCriticalFailure"}
          name: 'HPE ProLiant DL380: #{#CACHE_CNTRL_INDEX}: Disk array cache controller is in critical state!'
          opdata: 'Current state: {ITEM.LASTVALUE1}'
          priority: AVERAGE
          description: Please check the device for faults.
          tags:
          - tag: scope
            value: available
        - uuid: fd1fc88d4ef04e7c993edf3799ca39fc
          expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}])={$DISK.ARRAY.CACHE.STATUS.WARN:"cacheModDegradedFailsafeSpeed"} or last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}])={$DISK.ARRAY.CACHE.STATUS.WARN:"cacheReadCacheNotMapped"} or last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}])={$DISK.ARRAY.CACHE.STATUS.WARN:"cacheModFlashMemNotAttached"}
          name: 'HPE ProLiant DL380: #{#CACHE_CNTRL_INDEX}: Disk array cache controller is in warning state'
          opdata: 'Current state: {ITEM.LASTVALUE1}'
          priority: WARNING
          description: Please check the device for faults.
          dependencies:
          - name: 'HPE ProLiant DL380: #{#CACHE_CNTRL_INDEX}: Disk array cache controller is in critical state!'
            expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}])={$DISK.ARRAY.CACHE.STATUS.CRIT:"cacheModCriticalFailure"}
          tags:
          - tag: scope
            value: available
        - uuid: e313f7f474164d77900a648a5fc30089
          expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}])<>{$DISK.ARRAY.CACHE.STATUS.OK:"enabled"} and last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}])<>{$DISK.ARRAY.CACHE.STATUS.WARN:"invalid"}
          name: 'HPE ProLiant DL380: #{#CACHE_CNTRL_INDEX}: Disk array cache controller is not in optimal state'
          opdata: 'Current state: {ITEM.LASTVALUE1}'
          priority: WARNING
          description: Please check the device for faults.
          dependencies:
          - name: 'HPE ProLiant DL380: #{#CACHE_CNTRL_INDEX}: Disk array cache controller is in critical state!'
            expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}])={$DISK.ARRAY.CACHE.STATUS.CRIT:"cacheModCriticalFailure"}
          - name: 'HPE ProLiant DL380: #{#CACHE_CNTRL_INDEX}: Disk array cache controller is in warning state'
            expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}])={$DISK.ARRAY.CACHE.STATUS.WARN:"cacheModDegradedFailsafeSpeed"} or last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}])={$DISK.ARRAY.CACHE.STATUS.WARN:"cacheReadCacheNotMapped"} or last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}])={$DISK.ARRAY.CACHE.STATUS.WARN:"cacheModFlashMemNotAttached"}
          tags:
          - tag: scope
            value: available
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 6h
    - uuid: ec1392f18da64176967d8e24b7c5c3cb
      name: Array controller discovery
