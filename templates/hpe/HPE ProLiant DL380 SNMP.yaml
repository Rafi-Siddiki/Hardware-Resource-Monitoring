  triggers:
  - uuid: 50bd53fb99e845be8307d2742b066640
    expression: (last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.uptime[hrSystemUptime])>0 and last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.uptime[hrSystemUptime])<10m) or (last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.uptime[hrSystemUptime])=0 and last(/HPE ProLiant DL380 SNMP Unified/hp.server.net.uptime[sysUpTime])<10m)
    name: 'HPE ProLiant DL380: Host has been restarted'
    event_name: 'HPE ProLiant DL380: {HOST.NAME} has been restarted (uptime < 10m)'
    priority: WARNING
    description: Uptime is less than 10 minutes.
    manual_close: 'YES'
    tags:
    - tag: scope
      value: notice
