          name: 'HPE ProLiant DL380: Disk {#SNMPINDEX}({#DISK_NAME}): Virtual disk failed'
          opdata: 'Current state: {ITEM.LASTVALUE1}'
          priority: HIGH
          description: Please check virtual disk for warnings or errors.
          tags:
          - tag: scope
            value: available
        - uuid: a8511a2d75934b128fc674c3860ff1c9
          expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.virtualdisk.status[cpqDaLogDrvStatus.{#SNMPINDEX}])<>{$VDISK.STATUS.OK}
          name: 'HPE ProLiant DL380: Disk {#SNMPINDEX}({#DISK_NAME}): Virtual disk is not in OK state'
          opdata: 'Current state: {ITEM.LASTVALUE1}'
          priority: WARNING
          description: Please check virtual disk for warnings or errors.
          dependencies:
          - name: 'HPE ProLiant DL380: Disk {#SNMPINDEX}({#DISK_NAME}): Virtual disk failed'
            expression: last(/HPE ProLiant DL380 SNMP Unified/hp.server.hw.virtualdisk.status[cpqDaLogDrvStatus.{#SNMPINDEX}])={$VDISK.STATUS.CRIT}
          tags:
          - tag: scope
            value: available
      - uuid: 5e2c82ca7151454eb52dd53f03b20c14
        name: 'Virtual disk [{#DISK_NAME}]: Status'
        type: DEPENDENT
        key: unified.vd.status[{#SNMPINDEX}]
        description: Unified virtual disk status aligned with Lenovo-style dashboard values.
        valuemap:
          name: Unified storage status
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - |
            var v = Number(value);
            if (isNaN(v)) return 0;
            if (v === 2) return 1;
            if (v === 4) return 3;
            if (v === 5 || v === 6 || v === 7 || v === 12 || v === 14 || v === 16 || v === 18 || v === 19 || v === 21 || v === 22) return 4;
            if (v === 17 || v === 15 || v === 24 || v === 25) return 3;
            if (v === 3 || v === 8 || v === 9 || v === 10 || v === 11 || v === 13 || v === 20 || v === 23) return 5;
            return 0;
        master_item:
          key: hp.server.hw.virtualdisk.status[cpqDaLogDrvStatus.{#SNMPINDEX}]
        tags:
        - tag: component
          value: storage
        - tag: component
          value: virtualdisk
        - tag: style
          value: unified
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 6h
