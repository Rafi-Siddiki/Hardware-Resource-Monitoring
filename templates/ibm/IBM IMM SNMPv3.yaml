    - uuid: c18917121091483b9de8e7150b91c0f8
      name: RAID OOB Capable
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.2.3.51.3.1.13.1.1.0
      key: raidoobcapable
      history: 2d
      trends: 5d
      description: If raidOOBCapable is disabled, RAID table information is not available.
      valuemap:
        name: raidoobcapable
    - uuid: b7a12d4b8e06468ca518a843153316f7
      name: Trap
      type: SNMP_TRAP
      key: snmptrap["General"]
      history: 90d
      value_type: LOG
      logtimefmt: hh:mm:ss yyyy/MM/dd
      tags:
      - tag: Application
        value: Status
    discovery_rules:
    - uuid: 1e84ce787da84b3aa9d632e0040d7075
      name: Disk module Discovery
      type: SNMP_AGENT
      snmp_oid: discovery[{#DISKINDEX},1.3.6.1.4.1.2.3.51.3.1.12.2.1.1,{#DISKNAME},1.3.6.1.4.1.2.3.51.3.1.12.2.1.2]
      key: diskmodule.discovery
      lifetime: 30d
      enabled_lifetime_type: DISABLE_NEVER
      item_prototypes:
      - uuid: d59d930fe2d04149be7f1c9bfde72775
        name: 'Disk module [{#DISKNAME}]: Status (raw)'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.2.3.51.3.1.12.2.1.3.{#DISKINDEX}
        key: diskmodule.status.raw[{#DISKINDEX}]
        history: 30d
        value_type: TEXT
        tags:
        - tag: hardware
          value: storage
      - uuid: e66ac80ff34d44d2a66d82fe31244f42
        name: 'Disk module [{#DISKNAME}]: Status'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.2.3.51.3.1.12.2.1.3.{#DISKINDEX}
        key: diskmodule.status[{#DISKINDEX}]
        history: 30d
        trends: 5d
        valuemap:
          name: XCC Disk status
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - |
            var s = (value || '').trim().toLowerCase();
            if (s === '' || s === 'unknown' || s === 'n/a' || s === 'na') return 0;
            if (s === 'normal' || s === 'ok' || s === 'optimal' || s === 'online') return 1;
            if (s.indexOf('warn') !== -1 || s.indexOf('degrad') !== -1 || s.indexOf('noncritical') !== -1 || s.indexOf('non-critical') !== -1 || s.indexOf('rebuild') !== -1 || s.indexOf('rebuilding') !== -1) return 3;
            return 5;
        tags:
        - tag: hardware
          value: health
        - tag: hardware
          value: storage
        trigger_prototypes:
        - uuid: 1f01d2b5a2d74d8c8bdaef7dc8ebc070
          expression: last(/IBM IMM SNMPv3/diskmodule.status[{#DISKINDEX}])>=5
          name: 'Disk module [{#DISKNAME}]: FAILED/DEGRADED'
          priority: HIGH
          manual_close: 'YES'
    - uuid: 7346c43571864851a243495a290fbbf2
      name: Fan Discovery
      type: SNMP_AGENT
      snmp_oid: discovery[{#FANINDEX},1.3.6.1.4.1.2.3.51.3.1.3.2.1.1,{#FANNAME},1.3.6.1.4.1.2.3.51.3.1.3.2.1.2]
      key: fan.discovery
      lifetime: 30d
      enabled_lifetime_type: DISABLE_NEVER
      item_prototypes:
      - uuid: 00743279df76460ab34dee5d53991bfd
        name: 'Fan [{#FANNAME}]: Status'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.2.3.51.3.1.3.2.1.10.{#FANINDEX}
        key: fanhealth[{#FANINDEX}]
        history: 2d
        trends: 5d
        valuemap:
          name: XCC Fan status
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - |
            var s = (value || '').trim().toLowerCase();
            if (s === '' || s === 'unknown' || s === 'not installed' || s === 'not present' || s === 'absent' || s === 'n/a' || s === 'na') return 4;
            if (s === 'normal' || s === 'ok') return 1;
            return 5;
        tags:
        - tag: hardware
          value: fan
        - tag: hardware
          value: health
        trigger_prototypes:
        - uuid: 13d2a2b1e4464f8fb67a38d4831fa755
