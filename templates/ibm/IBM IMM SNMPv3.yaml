      history: 2d
      value_type: TEXT
      tags:
      - tag: Application
        value: hardware
    - uuid: ac00337a272c4bfca6e8a7fccac8030b
      name: Total power in use
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.2.3.51.3.1.10.1.10.0
      key: power.inuse
      delay: 120s
      history: 7d
      trends: 30d
      units: W
    - uuid: 67fd41b7446043cb9df011351fccc38e
      name: Power On Hours
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.2.3.51.3.5.1.2.0
      key: powerOnHours
      history: 2d
