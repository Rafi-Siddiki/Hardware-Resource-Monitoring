        name: 'Physical disk {#PDINDEX} ({#PDNAME}): Wear remaining (%)'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.2.3.51.3.1.13.1.3.1.25.{#PDINDEX}
        key: raid.pd.wear.pct[{#PDINDEX}]
        delay: 1h
        history: 30d
        value_type: FLOAT
        units: '%'
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - |
            var s = (value || '').trim();
            var m = s.match(/(\d+(?:\.\d+)?)\s*%/);
            if (m) return parseFloat(m[1]);
            return null;
        tags:
        - tag: Application
          value: SSD Wear
        - tag: component
          value: storage
        - tag: metric
          value: wear
