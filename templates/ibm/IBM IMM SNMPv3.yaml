        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.2.3.51.3.1.13.1.3.1.4.{#PDINDEX}
        key: raid.pd.state[{#PDINDEX}]
        delay: 3m
        history: 30d
        trends: 5d
        description: 'Numeric PD role/state for dashboards: 1=Online, 2=Hot spare, 3=Unconfigured good, 4=Rebuilding, 5=Offline/Failed/Missing, 0=Unknown.'
        valuemap:
          name: XCC RAID PD state
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - |
            var s = (value || '').trim().toLowerCase();
            if (s === '') return 0;
            if (s === 'online') return 1;
            if (s.indexOf('hot') !== -1 && s.indexOf('spare') !== -1) return 2;
            if (s === 'unconfigured good' || s === 'unconfigured-good') return 3;
            if (s.indexOf('rebuild') !== -1) return 4;
            return 5;
        tags:
        - tag: Application
          value: RAID Physical Disks
        trigger_prototypes:
        - uuid: 2d8879d1514b4d8489ed4cf9872267b4
