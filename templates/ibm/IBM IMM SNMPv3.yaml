        delay: 1h
        history: 30d
        value_type: TEXT
        tags:
        - tag: Application
          value: RAID Physical Disks
      overrides:
      - name: Disable SSD wear item for non-SSD drives
        step: '1'
        filter:
          evaltype: AND
          conditions:
          - macro: '{#PDTYPE}'
            value: (?i)(ssd|solid|flash)
            operator: NOT_MATCHES_REGEX
        operations:
        - value: raid.pd.wear.pct[{#PDINDEX}]
