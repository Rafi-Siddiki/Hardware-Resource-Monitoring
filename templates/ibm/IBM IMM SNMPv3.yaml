zabbix_export:
  version: '7.4'
  template_groups:
  - uuid: 0f609231b71d482688fa67d37d9b3328
    name: Templates/Servers Hardware
  templates:
  - uuid: 29cb5012b8e641178a158ee5ead3cb9e
    template: IBM IMM SNMPv3
    name: IBM IMM SNMPv3
    description: |
      Unified IMM-MIB SNMPv3 template (styled after the provided Lenovo XCC template).
      Includes:
        - System power, system health and machine VPD
        - Temperature + voltage + fan + PSU discoveries with numeric dashboard items
        - CPU + memory + LED discoveries
        - RAID controller, physical drive, storage pool and virtual drive discoveries
        - SSD wear parsing from raidDriveRemainingLife for honeycomb dashboarding
        - Adapter/network port discoveries for link status and speed
    vendor:
      name: Custom
      version: 7.0-imm-unified
    groups:
    - name: Templates/Servers Hardware
    items:
    - uuid: 68e40e2301b94a57b652d4b4cdad0701
      name: Adapter OOB Capable
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.2.3.51.3.1.14.1.0
      key: adapteroobcapable
      history: 2d
      trends: 5d
      valuemap:
        name: raidoobcapable
    - uuid: ebbf46be0aa7450099e5d230c539ea0f
      name: Power Status
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.2.3.51.3.5.1.1.0
      key: currentSysPowerStatus
      history: 2d
      trends: 5d
      valuemap:
        name: currentSysPowerStatus
    - uuid: 0ff847d73925444eb974c2338d3152fb
      name: Identity LED
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.2.3.51.3.1.8.1.0
      key: identityLED
      history: 2d
      trends: 5d
      valuemap:
        name: ledstate
    - uuid: 72221c6e8a98417fb03e19ef2ca79771
      name: Restart Count
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.2.3.51.3.5.1.3.0
      key: IMMrestartCount
      history: 2d
      trends: 5d
    - uuid: d8ee7c84906845d9bb6292cc8d7e2b43
      name: System Health Status
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.2.3.51.3.1.4.1.0
      key: IMMsystemHealthStat
      delay: '300'
      history: 2d
      trends: 5d
      valuemap:
        name: IMM-MIB::systemHealthStat
    - uuid: 7e6a54233e0d43018b7ea961ca27de2d
      name: System State
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.2.3.51.3.5.1.4.0
      key: IMMsystemState
      delay: '300'
      history: 2d
      trends: 5d
      valuemap:
        name: systemState
    - uuid: 1e641ab435144eca8de24f451d17455a
      name: Machine Model
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.2.3.51.3.1.5.2.1.2.0
      key: machinemodel
      delay: 1h
      history: 2d
      value_type: TEXT
      tags:
      - tag: Application
        value: hardware
    - uuid: 226a29e942c64df78f1e01bfed5d5eaa
      name: Product Name
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.2.3.51.3.1.5.2.1.5.0
      key: machineproductname
      delay: 1h
      history: 2d
      value_type: TEXT
      tags:
      - tag: Application
        value: hardware
    - uuid: cade466c48b240b0afc8674bee10acc7
      name: Machine Serial Number
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.2.3.51.3.1.5.2.1.3.0
      key: machinesrno
      delay: 1h
      history: 2d
      value_type: TEXT
      tags:
      - tag: Application
        value: hardware
    - uuid: 9c1391b30a564e3d8096cfc0bdd17e61
      name: Machine Type
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.2.3.51.3.1.5.2.1.1.0
      key: machinetype
