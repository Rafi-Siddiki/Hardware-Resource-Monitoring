    - uuid: 2162028021484f33ab434ad57935fc63
      name: 'PercCLI: HDD discovery'
      type: DEPENDENT
      key: perccli.hdd.discovery
      lifetime: 7d
      description: Discovers HDD physical disks only. Used for HDD health.
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - |
          var lines = value.split(/\r?\n/);
          var data = [];

          for (var i = 0; i < lines.length; i++) {
              var line = lines[i].trim();
              var fields = line.split(/\s+/);

              if (fields.length < 8) {
                  continue;
              }

              if (!/^\d+:\d+$/.test(fields[0])) {
                  continue;
              }

              if (fields[7] !== "HDD") {
                  continue;
              }

              var diskParts = fields[0].split(":");
              var eid = diskParts[0];
              var slot = diskParts[1];
              var model = fields.length >= 12 ? fields[11] : "";

              data.push({
                  "{#EID}": eid,
                  "{#SLOT}": slot,
                  "{#DID}": fields[1],
                  "{#STATE}": fields[2],
                  "{#DG}": fields[3],
                  "{#SIZE}": fields[4] + " " + fields[5],
                  "{#INTF}": fields[6],
                  "{#MEDIA}": fields[7],
                  "{#MODEL}": model,
                  "{#DISKID}": eid + ":" + slot,
                  "{#PDNAME}": "HDD " + eid + ":" + slot + (model ? " " + model : "")
              });
          }

          return JSON.stringify({"data": data});
      master_item:
        key: ssh.run[perccli.pd.raw,{HOST.CONN},{$PERC.SSH.PORT}]
      item_prototypes:
      - uuid: 77906c49389a4e859f98c73e14dced53
        name: 'PercCLI HDD [{#DISKID}]: Health'
        type: DEPENDENT
        key: perccli.hdd.health[{#DISKID}]
        history: 30d
        valuemap:
          name: PercCLI Health Status
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - |
            var eid = "{#EID}";
            var slot = "{#SLOT}";

            function stateCode(state) {
                switch (state) {
                    case "Onln":
                    case "Optl":
                        return 1;   // Healthy
                    case "DHS":
                    case "GHS":
                        return 2;   // Hot spare
                    case "UGood":
                    case "UGShld":
                    case "HSPShld":
                    case "CFShld":
                    case "Cpybck":
                    case "CBShld":
                        return 3;   // Warning
                    case "Rbld":
                    case "Rblding":
                    case "RblD":
                    case "Dgrd":
                    case "Pdgd":
                        return 4;   // Critical / degraded
                    case "Offln":
                    case "UBad":
                    case "Msng":
                    case "UBUnsp":
                        return 5;   // Failed / offline / missing
                    default:
                        return 0;   // Unknown
                }
            }

            var lines = value.split(/\r?\n/);

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                var fields = line.split(/\s+/);

                if (fields.length < 3) {
                    continue;
                }

                if (!/^\d+:\d+$/.test(fields[0])) {
                    continue;
                }

                var diskParts = fields[0].split(":");

                if (diskParts[0] === eid && diskParts[1] === slot) {
                    return stateCode(fields[2]);
                }
            }

            return 0;
        master_item:
          key: ssh.run[perccli.pd.raw,{HOST.CONN},{$PERC.SSH.PORT}]
        tags:
        - tag: component
          value: hdd
        - tag: disk
          value: '{#DISKID}'
        - tag: scope
          value: availability
      trigger_prototypes:
      - uuid: 316bc29041a3448a9e3de7344f0f9807
        expression: last(/Template PercCLI RAID SSH Password Components v2/perccli.hdd.health[{#DISKID}])>=4
        name: 'PercCLI HDD [{#DISKID}]: Critical health'
        priority: HIGH
        opdata: 'Current health: {ITEM.LASTVALUE1}'
        tags:
        - tag: scope
          value: availability
      - uuid: 82256aa39925444faf885decbcb07c9b
        expression: last(/Template PercCLI RAID SSH Password Components v2/perccli.hdd.health[{#DISKID}])=3
        name: 'PercCLI HDD [{#DISKID}]: Warning health'
        priority: WARNING
        opdata: 'Current health: {ITEM.LASTVALUE1}'
        tags:
        - tag: scope
          value: availability
    - uuid: 158feadbab614aacbfa4d0ab3bf59403
      name: 'PercCLI: Virtual drive discovery'
      type: DEPENDENT
      key: perccli.vd.discovery
      lifetime: 30d
      description: Discovers individual virtual drives from perccli /vall show.
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - |
          var lines = value.split(/\r?\n/);
          var data = [];

          for (var i = 0; i < lines.length; i++) {
              var line = lines[i].trim();
              var fields = line.split(/\s+/);

              // Common perccli /vall show row:
              // 0/0 RAID1 Optl RW Yes RWTD - OFF 446.625 GB Name
              if (fields.length < 10) {
                  continue;
              }

              if (!/^\d+\/\d+$/.test(fields[0])) {
                  continue;
              }

              var vdParts = fields[0].split("/");
              var dg = vdParts[0];
              var vd = vdParts[1];

              var name = "";
              if (fields.length > 10) {
                  name = fields.slice(10).join(" ");
              }
              if (name === "") {
                  name = "VD-" + dg + "-" + vd;
              }

              data.push({
                  "{#VD_DG}": dg,
                  "{#VD}": vd,
                  "{#VDID}": dg + "/" + vd,
                  "{#VDKEY}": dg + "_" + vd,
                  "{#VDTYPE}": fields[1],
                  "{#VDSTATE}": fields[2],
                  "{#VDACCESS}": fields[3],
                  "{#VDCONSIST}": fields[4],
                  "{#VDCACHE}": fields[5],
                  "{#VD_CAC}": fields[6],
                  "{#VD_SCC}": fields[7],
                  "{#VDSIZE}": fields[8] + " " + fields[9],
                  "{#VDNAME}": name
              });
          }

          return JSON.stringify({"data": data});
      master_item:
        key: ssh.run[perccli.vd.raw,{HOST.CONN},{$PERC.SSH.PORT}]
      item_prototypes:
      - uuid: 892bdb48063a450a9bacfa17130ae7dd
        name: 'PercCLI Virtual Drive [{#VDID}] {#VDNAME}: Health'
        type: DEPENDENT
        key: perccli.vd.health[{#VDKEY}]
        history: 30d
        valuemap:
          name: PercCLI Health Status
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - |
            var dg = "{#VD_DG}";
            var vd = "{#VD}";

            function vdStateCode(state) {
                switch (state) {
                    case "Optl":
                        return 1;   // Healthy
                    case "Pdgd":
                    case "Dgrd":
                    case "DGD":
                        return 4;   // Degraded
                    case "OfLn":
                    case "Offln":
                    case "Fld":
                    case "Failed":
                        return 5;   // Failed / offline
                    default:
                        return 0;   // Unknown
                }
            }

            var lines = value.split(/\r?\n/);

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                var fields = line.split(/\s+/);

                if (fields.length < 3) {
                    continue;
                }

                if (!/^\d+\/\d+$/.test(fields[0])) {
                    continue;
                }

                var vdParts = fields[0].split("/");

                if (vdParts[0] === dg && vdParts[1] === vd) {
                    return vdStateCode(fields[2]);
                }
            }

            return 0;
        master_item:
          key: ssh.run[perccli.vd.raw,{HOST.CONN},{$PERC.SSH.PORT}]
